function setS(msg,state){document.getElementById('sTxt').textContent=msg;document.getElementById('sDot').className='dot '+state;}

// ── LOAD ──────────────────────────────────────────────────────────────────────
async function load() {
  setS('Loading...','ld');
  try {
    const res = await fetch(SCRIPT_URL+'?action=getPredictions&t='+Date.now());
    const data = await res.json();
    renderAll(data.players||[]);
    setS('✅ '+(data.players?.length||0)+' players · '+new Date().toLocaleTimeString(),'ok');
  } catch(e) {
    setS('Error ❌','er');
    document.getElementById('views').innerHTML='<div class="empty">Could not load. Try refreshing.</div>';
  }
}

function renderAll(players) {
  const tabs=document.getElementById('tabs'), views=document.getElementById('views');
  if(!players.length){tabs.innerHTML='';views.innerHTML='<div class="empty">🏆 No predictions yet.</div>';return;}
  tabs.innerHTML=players.map((p,i)=>`<button class="ptab ${i===0?'active':''}" onclick="sw(${i})">${p.name||'?'}</button>`).join('');
  views.innerHTML=players.map((p,i)=>renderPlayer(p,i)).join('');
}
function sw(i){document.querySelectorAll('.ptab').forEach((t,j)=>t.classList.toggle('active',i===j));document.querySelectorAll('.pview').forEach((v,j)=>v.classList.toggle('active',i===j));}

// ── COMPUTE STANDINGS FROM SCORES (exact same as prediction form) ─────────────
function computeStandingsFromScores(gsScores) {
  const gst = {};
  for (const g of Object.keys(GROUPS)) {
    gst[g] = {};
    for (const t of GROUPS[g].teams) {
      gst[g][t.name] = {name:t.name, flag:t.flag, pts:0, gd:0, gf:0, ga:0};
    }
  }
  for (let id=1; id<=72; id++) {
    const m = MATCHES[id];
    const sc = gsScores[id] || gsScores[String(id)] || {};
    if (sc.h===undefined) continue;
    const h=sc.h, a=sc.a;
    const ht=gst[m.g][m.h], at=gst[m.g][m.a];
    if(!ht||!at) continue;
    ht.gf+=h; ht.ga+=a; ht.gd+=h-a;
    at.gf+=a; at.ga+=h; at.gd+=a-h;
    if(h>a){ht.pts+=3;}else if(a>h){at.pts+=3;}else{ht.pts+=1;at.pts+=1;}
  }
  // Sort each group
  for (const g of Object.keys(GROUPS)) {
    const teams = Object.values(gst[g]);
    teams.sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
    gst[g] = teams; // now array sorted
  }
  return gst;
}

// ── RESOLVE KO BRACKET (exact same logic as prediction form buildKnockout) ────
function resolveBracket(gst, koScores, kqData) {
  // gst = computed standings: {A:[{name,flag,pts,...},...], ...}
  
  function getT(g, pos) {
    const teams = gst[g];
    if (!teams || !teams[pos]) return {name:`${['1st','2nd','3rd','4th'][pos]||pos+'th'} Group ${g}`, flag:'🏳'};
    return {name: teams[pos].name, flag: teams[pos].flag};
  }

  // Best 3rd - EXACT same as prediction form
  const allThirds = Object.keys(GROUPS).map(g => {
    const teams = gst[g];
    if (!teams || teams.length < 3) return {name:`3rd ${g}`, flag:'🏳', pts:0, gd:0, gf:0, group:g};
    return {...teams[2], group:g};
  });
  allThirds.sort((a,b) => b.pts-a.pts || b.gd-a.gd || b.gf-a.gf);
  const best8 = allThirds.slice(0,8);
  const comboKey = best8.map(t=>t.group).sort().join('');
  const annexRow = FIFA_ANNEX_C[comboKey] || ['E','J','I','F','H','G','L','K'];

  function get3rd(groupLetter) {
    const t = allThirds.find(x => x.group === groupLetter);
    return t ? {name:t.name, flag:t.flag} : {name:`3rd ${groupLetter}`, flag:'🏳'};
  }

  // R32 teams - EXACT same as prediction form
  const koMatchData = {
    r32_73:{h:getT('A',1),a:getT('B',1)},
    r32_74:{h:getT('E',0),a:get3rd(annexRow[3])},
    r32_75:{h:getT('F',0),a:getT('C',1)},
    r32_76:{h:getT('C',0),a:getT('F',1)},
    r32_77:{h:getT('I',0),a:get3rd(annexRow[5])},
    r32_78:{h:getT('E',1),a:getT('I',1)},
    r32_79:{h:getT('A',0),a:get3rd(annexRow[0])},
    r32_80:{h:getT('L',0),a:get3rd(annexRow[7])},
    r32_81:{h:getT('D',0),a:get3rd(annexRow[2])},
    r32_82:{h:getT('G',0),a:get3rd(annexRow[4])},
    r32_83:{h:getT('K',1),a:getT('L',1)},
    r32_84:{h:getT('H',0),a:getT('J',1)},
    r32_85:{h:getT('B',0),a:get3rd(annexRow[1])},
    r32_86:{h:getT('J',0),a:getT('H',1)},
    r32_87:{h:getT('K',0),a:get3rd(annexRow[6])},
    r32_88:{h:getT('D',1),a:getT('G',1)},
  };

  // Init R16+ as TBD
  ['r16_1','r16_2','r16_3','r16_4','r16_5','r16_6','r16_7','r16_8',
   'qf_1','qf_2','qf_3','qf_4','sf_1','sf_2','final','third'].forEach(id => {
    koMatchData[id] = {h:{name:'TBD',flag:'🏳'},a:{name:'TBD',flag:'🏳'}};
  });

  // Advance winners through bracket using BRACKET_FLOW
  function getWinner(id) {
    const sc = koScores[id]||{};
    if(sc.h===undefined||sc.a===undefined) return null;
    const h=koMatchData[id]?.h, a=koMatchData[id]?.a;
    if(sc.h>sc.a) return {w:h,l:a};
    if(sc.a>sc.h) return {w:a,l:h};
    const q=kqData[id];
    if(q==='h') return {w:h,l:a};
    if(q==='a') return {w:a,l:h};
    return null;
  }

  // Process all matches in order using BRACKET_FLOW
  const matchOrder = [
    ...Object.keys(koMatchData).filter(k=>k.startsWith('r32_')),
    ...Object.keys(koMatchData).filter(k=>k.startsWith('r16_')),
    ...Object.keys(koMatchData).filter(k=>k.startsWith('qf_')),
    ...Object.keys(koMatchData).filter(k=>k.startsWith('sf_')),
    'final','third'
  ];

  matchOrder.forEach(id => {
    const flow = BRACKET_FLOW[id];
    if(!flow) return;
    const result = getWinner(id);
    if(!result) return;
    const {w,l} = result;
    if(flow.next) {
      if(!koMatchData[flow.next]) koMatchData[flow.next]={h:{name:'TBD',flag:'🏳'},a:{name:'TBD',flag:'🏳'}};
      koMatchData[flow.next][flow.side] = w;
    } else if(flow.nextW) {
      if(!koMatchData[flow.nextW]) koMatchData[flow.nextW]={h:{name:'TBD',flag:'🏳'},a:{name:'TBD',flag:'🏳'}};
      koMatchData[flow.nextW][flow.sideW] = w;
      if(!koMatchData[flow.nextL]) koMatchData[flow.nextL]={h:{name:'TBD',flag:'🏳'},a:{name:'TBD',flag:'🏳'}};
      koMatchData[flow.nextL][flow.sideL] = l;
    }
  });

  return koMatchData;
}

// ── RENDER PLAYER ─────────────────────────────────────────────────────────────
function renderPlayer(p, idx) {
  const gs = p.gsScores||{};
  const ko = p.koScores||{};
  const kq = p.koQualifiers||{};
  const stPred = p.gsStandings||{}; // player's predicted order (strings)
  const gsCount = Object.keys(gs).length;
  const koCount = Object.keys(ko).length;

  // Compute standings from GS scores (gives us pts/gd/gf for Annex C)
  const gst = computeStandingsFromScores(gs);

  // Resolve full bracket
  const bracket = resolveBracket(gst, ko, kq);

  // ── STANDINGS (use computed order with pts) ──
  let stHtml = '<div class="stgrid">';
  Object.keys(GROUPS).forEach(g => {
    const teams = gst[g]||[];
    stHtml += `<div class="gcard"><div class="ghdr">GROUP ${g}</div>
      ${teams.map((t,i)=>`<div class="strow"><span style="font-size:12px;min-width:20px;">${POS[i]}</span><span>${t.flag} ${t.name}</span><span style="margin-left:auto;font-size:9px;color:#7700ff;">${t.pts}pts</span></div>`).join('')}
    </div>`;
  });
  stHtml += '</div>';

  // ── GS MATCHES ──
  let gsHtml = '<div class="mgrid">';
  for(let id=1;id<=72;id++){
    const m=MATCHES[id];
    const sc=gs[id]||gs[String(id)]||{};
    const h=sc.h!==undefined?sc.h:'–',a=sc.a!==undefined?sc.a:'–';
    // Get flags from GROUPS
    const hTeam=GROUPS[m.g].teams.find(t=>t.name===m.h)||{flag:'🏳'};
    const aTeam=GROUPS[m.g].teams.find(t=>t.name===m.a)||{flag:'🏳'};
    let res='',rc='';
    if(sc.h!==undefined&&sc.a!==undefined){if(sc.h>sc.a){res='H';rc='h';}else if(sc.a>sc.h){res='A';rc='a';}else{res='D';rc='d';}}
    gsHtml+=`<div class="mrow">
      <span class="mnum">#${id}</span><span class="mgrp">${m.g}</span>
      <span class="mteam">${hTeam.flag} ${m.h}</span>
      <span class="mscore">${h}</span><span class="msep">:</span><span class="mscore">${a}</span>
      <span class="mteam" style="text-align:right">${m.a} ${aTeam.flag}</span>
      ${res?`<span class="mres ${rc}">${res}</span>`:''}
    </div>`;
  }
  gsHtml += '</div>';

  // ── KO MATCHES ──
  let koHtml = '';
  KO_ROUNDS.forEach(round=>{
    koHtml+=`<div class="rnlbl">${round.label}</div>`;
    round.ids.forEach(id=>{
      const sc=ko[id]||{};
      const hSc=sc.h!==undefined?sc.h:'–', aSc=sc.a!==undefined?sc.a:'–';
      const label=KO_LABELS[id]||id;
      const teams=bracket[id]||{h:{name:'TBD',flag:'🏳'},a:{name:'TBD',flag:'🏳'}};
      const ht=teams.h,at=teams.a;
      let winnerName='',winSide='';
      if(sc.h!==undefined&&sc.a!==undefined){
        if(sc.h>sc.a){winnerName=ht.name;winSide='h';}
        else if(sc.a>sc.h){winnerName=at.name;winSide='a';}
        else{const q=kq[id];winnerName=q==='h'?ht.name:q==='a'?at.name:'';winSide=q||'';}
      }
      const isFinal=id==='final',is3rd=id==='third';
      koHtml+=`<div class="korow ${isFinal?'final':is3rd?'third':''}">
        <span class="konum">${label}</span>
        <span class="koteam ${winSide==='h'?'win':''}">${ht.flag} ${ht.name}</span>
        <span class="koscore">${hSc}</span><span class="msep">:</span><span class="koscore">${aSc}</span>
        <span class="koteam ${winSide==='a'?'win':''}" style="text-align:right">${at.name} ${at.flag}</span>
        ${winnerName?`<span class="kowinner">✅ ${winnerName}</span>`:''}
      </div>`;
    });
  });

  return `<div class="pview ${idx===0?'active':''}" id="pv-${idx}">
    <div class="phead">
      <div style="font-size:36px;">⚽</div>
      <div><div class="pname">${p.name||'?'}</div><div class="pmeta">${gsCount}/72 GS · ${koCount}/32 KO</div></div>
      <div class="pstats">
        <div><div class="snum">${gsCount}</div><div class="slbl">GS</div></div>
        <div><div class="snum">${koCount}</div><div class="slbl">KO</div></div>
      </div>
    </div>
    <div class="sectitle">📊 Group Standings</div>${stHtml}
    <div class="sectitle">⚽ Group Stage (${gsCount}/72)</div>${gsHtml}
    <div class="sectitle">🏆 Knockout Stage (${koCount}/32)</div>${koHtml}
  </div>`;
}
