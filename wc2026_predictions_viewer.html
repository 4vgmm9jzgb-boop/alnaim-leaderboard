body{background:#080010;font-family:'Roboto',sans-serif;min-height:100vh;color:#e0c0ff;}

.hflags{margin-left:auto;font-size:24px;display:flex;gap:6px;}

.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.dot.ok{background:#00cc44;}.dot.loading{background:#7700ff;animation:pulse 1s infinite;}.dot.err{background:#cc0000;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}

.container{padding:16px 20px 40px;}

.ptab:hover{border-color:#00ffff;color:#00ffff;}
.ptab.active{background:#7700ff;color:#fff;border-color:#7700ff;}
.ptab.no-data{opacity:0.5;cursor:default;}

/* PLAYER CARD */
.player-view{display:none;}
.player-view.active{display:block;}

  align-items:center;
  gap:16px;

.m-result.draw{background:#44440022;color:#ffff44;border:1px solid #ffff4433;}

function setStatus(msg, state) {
  document.getElementById('statusText').textContent = msg;
  document.getElementById('statusDot').className = 'dot ' + state;
}

async function loadPredictions() {
  setStatus('Loading predictions...', 'loading');
  try {
    const res = await fetch(SCRIPT_URL + '?action=getPredictions&t=' + Date.now());
    const data = await res.json();
    renderAll(data.players || []);
    setStatus(`вњ… ${data.players?.length || 0} players loaded В· ${new Date().toLocaleTimeString()}`, 'ok');
  } catch(e) {
    setStatus('Error loading вқЊ', 'err');
    document.getElementById('playerTabs').innerHTML = '<div class="empty">Could not load predictions. Try refreshing.</div>';
  }
}

function renderAll(players) {
  const tabsEl = document.getElementById('playerTabs');
  const viewsEl = document.getElementById('playerViews');

  if (!players.length) {
    tabsEl.innerHTML = '';
    viewsEl.innerHTML = '<div class="empty">рџЏ† No predictions submitted yet.<br><br>Players need to submit their predictions first!</div>';
    return;
  }

  tabsEl.innerHTML = players.map((p,i) =>
    `<button class="ptab ${i===0?'active':''}" onclick="switchPlayer(${i})">${p.name||'Unknown'}</button>`
  ).join('');

  viewsEl.innerHTML = players.map((p,i) => renderPlayer(p, i)).join('');
}

function switchPlayer(idx) {
  document.querySelectorAll('.ptab').forEach((t,i) => t.classList.toggle('active', i===idx));
  document.querySelectorAll('.player-view').forEach((v,i) => v.classList.toggle('active', i===idx));
}

  'Portugal':'рџ‡µрџ‡№','DR Congo':'рџ‡Ёрџ‡©','Uzbekistan':'рџ‡ғрџ‡ү','Colombia':'рџ‡Ёрџ‡ө',
  'England':'рџЏөу Ѓ§у Ѓұу ЃӨу Ѓ®у Ѓ§у Ѓү','Croatia':'рџ‡­рџ‡·','Ghana':'рџ‡¬рџ‡­','Panama':'рџ‡µрџ‡¦',
  'Khalid AlNaim':'рџ‘¤','Abdullah Alnaim':'рџ‘¤',
};
function getFlag(name) { return FLAGS[name] || 'рџЏі'; }

function renderPlayer(p, idx) {
  const gs = p.gsScores || {};
  const ko = p.koScores || {};
  const kq = p.koQualifiers || {};
  const st = p.gsStandings || {};

  const gsCount = Object.keys(gs).length;
  const koCount = Object.keys(ko).length;

  // GS matches grouped by date
  let gsHtml = '<div class="matches-grid">';
  GS_MATCHES.forEach(m => {
    const sc = gs[m.id] || gs[String(m.id)] || {};
    const h = sc.h !== undefined ? sc.h : 'вЂ“';
    const a = sc.a !== undefined ? sc.a : 'вЂ“';
    let result='', resultClass='';
    if (sc.h !== undefined && sc.a !== undefined) {
      if (sc.h > sc.a) { result='H WIN'; resultClass='home'; }
      else if (sc.a > sc.h) { result='A WIN'; resultClass='away'; }
      else { result='DRAW'; resultClass='draw'; }
    }
    gsHtml += `<div class="match-row">
      <span class="m-num">#${m.id}</span>
      <span class="m-grp">${m.g}</span>
      <span class="m-team">${m.hf} ${m.h}</span>
      <span class="m-score">${h}</span>
      <span class="m-sep">:</span>
      <span class="m-score">${a}</span>
      <span class="m-team" style="text-align:right">${m.af} ${m.a}</span>
      ${result ? `<span class="m-result ${resultClass}">${result}</span>` : ''}
    </div>`;
  });
  gsHtml += '</div>';

  // Standings
  let stHtml = '<div class="standings-grid">';
  'ABCDEFGHIJKL'.split('').forEach(g => {
    const teams = st[g] || [];
    stHtml += `<div class="group-card">
      <div class="group-header">GROUP ${g}</div>
      ${[0,1,2,3].map(pos => `
        <div class="standing-row">
          <span class="pos-medal">${POS_MEDALS[pos]}</span>
          <span class="standing-team">${teams[pos] ? getFlag(teams[pos])+' '+teams[pos] : 'вЂ“'}</span>
        </div>`).join('')}
    </div>`;
  });
  stHtml += '</div>';

  // KO matches
  // Resolve KO team names from player's own standings + Annex C for 3rd place
  function resolveKOTeams(st, ko, kq) {
    const f = (g,pos) => { const t=st[g]?.[pos]; return t?{n:t,f:getFlag(t)}:{n:`${pos===0?'1st':pos===1?'2nd':'3rd'} ${g}`,f:'рџЏі'}; };
    const w = (id,h,a) => {
      const sc=ko[id]||{}; if(sc.h===undefined) return h;
      if(sc.h>sc.a) return h; if(sc.a>sc.h) return a;
      const q=kq[id]; return q==='h'?h:(q==='a'?a:h);
    };

    // Get all 3rd place teams sorted by pts/gd/gf
    const all3 = 'ABCDEFGHIJKL'.split('').map(g => {
      const t = st[g]?.[2]; return t ? {n:t, f:getFlag(t), g} : {n:`3rd ${g}`, f:'рџЏі', g};
    });
    // Use FIFA Annex C lookup
    const best8 = all3.slice(); // simplified - use order from standings
    const comboKey = all3.map(x=>x.g).sort().join('');
    const annexRow = (typeof FIFA_ANNEX_C !== 'undefined' && FIFA_ANNEX_C[comboKey]) || ['E','F','I','A','H','I','K','L'];
    const get3 = (idx) => { const g = annexRow[idx]; const t = all3.find(x=>x.g===g); return t || {n:`3rd ${g}`,f:'рџЏі'}; };

    const t = {
      r32_73:{h:f('A',1),a:f('B',1)},
      r32_74:{h:f('E',0),a:get3(3)},
      r32_75:{h:f('F',0),a:f('C',1)},
      r32_76:{h:f('C',0),a:f('F',1)},
      r32_77:{h:f('I',0),a:get3(5)},
      r32_78:{h:f('E',1),a:f('I',1)},
      r32_79:{h:f('A',0),a:get3(0)},
      r32_80:{h:f('L',0),a:get3(7)},
      r32_81:{h:f('D',0),a:get3(2)},
      r32_82:{h:f('G',0),a:get3(4)},
      r32_83:{h:f('K',1),a:f('L',1)},
      r32_84:{h:f('H',0),a:f('J',1)},
      r32_85:{h:f('B',0),a:get3(1)},
      r32_86:{h:f('J',0),a:f('H',1)},
      r32_87:{h:f('K',0),a:get3(6)},
      r32_88:{h:f('D',1),a:f('G',1)},
    };
    [['r16_1','r32_74','r32_77'],['r16_2','r32_73','r32_75'],
     ['r16_3','r32_76','r32_78'],['r16_4','r32_79','r32_80'],
     ['r16_5','r32_83','r32_84'],['r16_6','r32_81','r32_82'],
     ['r16_7','r32_86','r32_88'],['r16_8','r32_85','r32_87']].forEach(([id,m1,m2])=>{
      t[id]={h:w(m1,t[m1].h,t[m1].a), a:w(m2,t[m2].h,t[m2].a)};
    });
    [['qf_1','r16_1','r16_2'],['qf_2','r16_5','r16_6'],
     ['qf_3','r16_3','r16_4'],['qf_4','r16_7','r16_8']].forEach(([id,m1,m2])=>{
      t[id]={h:w(m1,t[m1].h,t[m1].a), a:w(m2,t[m2].h,t[m2].a)};
    });
    const sfL={};
    [['sf_1','qf_1','qf_2'],['sf_2','qf_3','qf_4']].forEach(([id,m1,m2])=>{
      const wt1=w(m1,t[m1].h,t[m1].a), lt1=t[m1].h.n===wt1.n?t[m1].a:t[m1].h;
      const wt2=w(m2,t[m2].h,t[m2].a), lt2=t[m2].h.n===wt2.n?t[m2].a:t[m2].h;
      t[id]={h:wt1,a:wt2}; sfL[id]={l1:lt1,l2:lt2};
    });
    const wSF1=w('sf_1',t['sf_1'].h,t['sf_1'].a), wSF2=w('sf_2',t['sf_2'].h,t['sf_2'].a);
    const lSF1=wSF1.n===t['sf_1'].h.n?sfL['sf_1'].l1:sfL['sf_1'].l2;
    const lSF2=wSF2.n===t['sf_2'].h.n?sfL['sf_2'].l1:sfL['sf_2'].l2;
    t['final']={h:wSF1,a:wSF2}; t['third']={h:lSF1,a:lSF2};
    return t;
  }
  const koTeams = resolveKOTeams(st, ko, kq);

  let koHtml = '';
  KO_ROUNDS.forEach(round => {
    koHtml += `<div class="round-label">${round.label}</div>`;
    round.ids.forEach(id => {
      const sc = ko[id] || {};
      const hSc = sc.h !== undefined ? sc.h : 'вЂ“';
      const aSc = sc.a !== undefined ? sc.a : 'вЂ“';
      const label = round.labels[id] || id;
      const teams = koTeams[id] || {h:{n:'TBD',f:'рџЏі'}, a:{n:'TBD',f:'рџЏі'}};
      const hTeam = teams.h || {n:'TBD',f:'рџЏі'};
      const aTeam = teams.a || {n:'TBD',f:'рџЏі'};
      let winnerTeam = '';
      if (sc.h !== undefined && sc.a !== undefined) {
        if (sc.h > sc.a) winnerTeam = `вњ… ${getFlag(hTeam.n)} ${hTeam.n}`;
        else if (sc.a > sc.h) winnerTeam = `вњ… ${getFlag(aTeam.n)} ${aTeam.n}`;
        else {
          const q = kq[id];
          const qt = q==='h' ? hTeam : q==='a' ? aTeam : null;
          winnerTeam = qt ? `вњ… ${getFlag(qt.n)} ${qt.n} (Q)` : 'рџ¤қ DRAW';
        }
      }
      koHtml += `<div class="ko-match-row">
        <span class="ko-num">${label}</span>
        <span class="ko-team">${getFlag(hTeam.n)} ${hTeam.n}</span>
        <span class="ko-score">${hSc}</span>
        <span class="m-sep">:</span>
        <span class="ko-score">${aSc}</span>
        <span class="ko-team" style="text-align:right">${aTeam.n} ${getFlag(aTeam.n)}</span>
        ${winnerTeam ? `<span class="ko-winner">${winnerTeam}</span>` : ''}
      </div>`;
    });
  });

  return `<div class="player-view ${idx===0?'active':''}" id="pview-${idx}">
    <div class="player-header">
      <div class="player-avatar">вљҢ</div>
      <div>
        <div class="player-name">${p.name || 'Unknown'}</div>
        <div class="player-meta">${gsCount}/72 GS matches В· ${koCount}/32 KO matches</div>
      </div>
      <div class="player-stats">
        <div class="stat-box"><div class="stat-num">${gsCount}</div><div class="stat-label">GS MATCHES</div></div>
        <div class="stat-box"><div class="stat-num">${koCount}</div><div class="stat-label">KO MATCHES</div></div>
        <div class="stat-box"><div class="stat-num">${Object.keys(st).length}</div><div class="stat-label">GROUPS</div></div>
      </div>
    </div>

    <div class="sec-title">рџ“Љ Group Standings Prediction</div>
    ${stHtml}

    <div class="sec-title">вљҢ Group Stage Predictions (${gsCount}/72)</div>
    ${gsHtml}

    <div class="sec-title">рџЏ† Knockout Stage Predictions (${koCount}/32)</div>
    ${koHtml}
  </div>`;
}

loadPredictions();
</script>
